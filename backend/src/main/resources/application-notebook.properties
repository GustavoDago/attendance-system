# =============================================================================
# application-notebook.properties
# Perfil específico para ejecutar en una notebook standalone (4GB RAM)
# Activar con: --spring.profiles.active=notebook
# =============================================================================

# === Base de datos H2 persistente en archivo ===
# La base de datos se guardará en la carpeta "data" junto al archivo JAR.
spring.datasource.url=jdbc:h2:file:./data/attendance_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Actualiza el esquema de la base de datos sin borrar datos
spring.jpa.hibernate.ddl-auto=update

# Escuchar en todas las interfaces por si se necesita acceder desde otro equipo en la misma red
server.address=0.0.0.0
server.port=8080

# Deshabilitar la consola H2 en este entorno
spring.h2.console.enabled=false
