# =============================================================================
# application-prod.properties
# Perfil de producción para el servidor Debian de la escuela.
# Activar con: --spring.profiles.active=prod
# =============================================================================

# === Base de datos H2 persistente en archivo ===
spring.datasource.url=jdbc:h2:file:./data/attendance_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# update: Hibernate actualiza el esquema sin destruir datos existentes
spring.jpa.hibernate.ddl-auto=update

# Deshabilitar H2 Console en producción (seguridad)
spring.h2.console.enabled=false

# Escuchar solo en localhost — Nginx actúa como reverse proxy
server.address=127.0.0.1
server.port=8080
